<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — VBS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary:#486f5d;--primary2:#2d4a3e;--light:#5e9480;
            --ink:#0f0e17;--paper:#fafaf8;--surface:#fff;
            --border:#e2e1f0;--muted:#6b7280;
            --green:#16a34a;--green-bg:#dcfce7;
            --amber:#d97706;--amber-bg:#fef3c7;
            --red:#dc2626;--red-bg:#fef2f2;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Quicksand',sans-serif;background:var(--paper);min-height:100vh;padding:24px 16px 100px;position:relative;overflow-x:hidden}
        body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(90px);opacity:.12;pointer-events:none;z-index:0;will-change:auto}
        body::before{width:600px;height:600px;background:radial-gradient(circle,#486f5d,#2d4a3e);top:-150px;right:-150px}
        body::after{width:500px;height:500px;background:radial-gradient(circle,#f97316,#fb923c);bottom:-120px;left:-100px}

        .page{position:relative;z-index:1;isolation:isolate;max-width:720px;margin:0 auto}

        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        .brand{display:flex;align-items:center;gap:10px}
        .brand-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700}
        .brand-name{font-size:19px;font-weight:700;color:var(--ink)}
        .btn-nav{padding:9px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s}
        .btn-nav:hover{border-color:#8ab5a3;color:var(--primary)}

        /* Profile hero */
        .profile-hero{
            background:linear-gradient(135deg,var(--primary),var(--primary2));
            border-radius:20px;padding:30px;color:#fff;
            margin-bottom:18px;
            box-shadow:0 8px 32px rgba(72,111,93,.25);
            display:flex;align-items:center;gap:20px;
            position:relative;overflow:hidden;
        }
        .profile-hero::after{content:'';position:absolute;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.06);top:-60px;right:-40px}
        .avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;z-index:1}
        .hero-info{z-index:1}
        .hero-info h2{font-size:22px;font-weight:700;margin-bottom:4px}
        .hero-info p{font-size:13px;opacity:.8;font-weight:500;margin-bottom:8px}
        .hero-badges{display:flex;gap:7px;flex-wrap:wrap}
        .h-badge{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3)}

        /* Skeleton */
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .sk-light{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
        .sk-h16{height:16px;margin-bottom:8px}
        .sk-h12{height:12px;margin-bottom:6px}
        .sk-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px}

        /* Stats grid */
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
        .stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px;text-align:center;transition:all .2s}
        .stat-card:hover{border-color:#8ab5a3;transform:translateY(-2px);box-shadow:0 6px 20px rgba(72,111,93,.1)}
        .stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
        .stat-val{font-size:20px;font-weight:700;color:var(--ink)}

        /* Details card */
        .details-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:24px;margin-bottom:18px}
        .section-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
        .section-hdr h3{font-size:15px;font-weight:700;color:var(--ink)}
        .btn-edit{padding:7px 16px;background:var(--paper);border:1.5px solid var(--border);border-radius:9px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;color:var(--primary);cursor:pointer;transition:all .2s}
        .btn-edit:hover{border-color:var(--primary);background:#f0f7f4}

        .detail-rows{display:flex;flex-direction:column;gap:0}
        .detail-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--paper)}
        .detail-row:last-child{border-bottom:none}
        .dl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
        .dv{font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
        .copy-btn{background:none;border:none;cursor:pointer;font-size:14px;opacity:.5;transition:opacity .2s;padding:2px}
        .copy-btn:hover{opacity:1}

        .type-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
        .pill-savings{background:var(--green-bg);color:var(--green)}
        .pill-current{background:#fef3e2;color:#b45309}
        .pill-admin{background:#f1f5f9;color:#64748b}

        /* Quick actions */
        .quick-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px}
        .qa-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:13px;padding:16px 10px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:7px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;color:var(--ink)}
        .qa-btn:hover{border-color:#8ab5a3;transform:translateY(-2px);box-shadow:0 6px 18px rgba(72,111,93,.1)}
        .qa-icon{font-size:22px}

        /* Message */
        .message{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:16px;display:none}
        .message.show{display:block}
        .message.success{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
        .message.error{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}

        /* Modal */
        .modal{display:none;position:fixed;z-index:9999;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);align-items:center;justify-content:center}
        .modal.show{display:flex}
        .modal-card{background:var(--surface);border-radius:20px;padding:28px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);border:1px solid var(--border);animation:up .3s ease both}
        @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .modal-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:18px}
        .inline-error{display:none;background:var(--red-bg);border:1.5px solid #fecaca;border-radius:10px;padding:10px 13px;font-size:13px;font-weight:600;color:var(--red);margin-bottom:14px}
        .field{display:flex;flex-direction:column;margin-bottom:16px}
        .field label{font-size:12px;font-weight:700;color:#374151;margin-bottom:6px}
        .field input,.field select{padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:'Quicksand',sans-serif;font-weight:500;color:var(--ink);transition:all .2s;background:var(--surface)}
        .field input:focus,.field select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(72,111,93,.1)}
        .modal-btns{display:flex;gap:10px;justify-content:flex-end}
        .btn-primary{padding:11px 22px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border:none;border-radius:10px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(72,111,93,.35)}
        .btn-ghost{padding:11px 18px;background:var(--paper);color:var(--muted);border:1.5px solid var(--border);border-radius:10px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
        .btn-ghost:hover{border-color:#8ab5a3;color:var(--primary)}

        /* Mobile Nav */
        .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1.5px solid var(--border);z-index:500;box-shadow:0 -4px 20px rgba(0,0,0,.07);padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px))}
        @media(max-width:768px){
            .mobile-nav{display:flex}
            .stats-grid{grid-template-columns:1fr 1fr}
            .quick-actions{grid-template-columns:1fr 1fr 1fr}
            body{padding-bottom:90px}
        }
        .mnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;padding:6px 0;color:var(--muted);transition:color .2s}
        .mnav-item.active{color:var(--primary)}
        .mnav-icon{font-size:22px}
        .mnav-label{font-size:10px;font-weight:700}
    </style>
</head>
<body>
<div class="page">
    <div class="top-bar">
        <div class="brand">
            <div class="brand-logo">VB</div>
            <span class="brand-name">My Profile</span>
        </div>
        <button class="btn-nav" onclick="location.href='dashboard.html'">← Dashboard</button>
    </div>

    <div id="profileMsg" class="message"></div>

    <!-- Hero (skeleton while loading) -->
    <div class="profile-hero" id="profileHero">
        <div class="avatar" id="avatarEl">⏳</div>
        <div class="hero-info" id="heroInfo" style="width:100%">
            <div class="sk sk-h16" style="width:50%;background:rgba(255,255,255,.2);margin-bottom:8px"></div>
            <div class="sk sk-h12" style="width:35%;background:rgba(255,255,255,.15);margin-bottom:12px"></div>
            <div style="display:flex;gap:7px">
                <div class="sk" style="width:70px;height:22px;border-radius:20px;background:rgba(255,255,255,.15)"></div>
                <div class="sk" style="width:90px;height:22px;border-radius:20px;background:rgba(255,255,255,.15)"></div>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card sk-card"><div class="sk-light sk-h16 sk-w60"></div><div class="sk-light sk-h12 sk-w40"></div></div>
        <div class="stat-card sk-card"><div class="sk-light sk-h16 sk-w60"></div><div class="sk-light sk-h12 sk-w40"></div></div>
        <div class="stat-card sk-card"><div class="sk-light sk-h16 sk-w60"></div><div class="sk-light sk-h12 sk-w40"></div></div>
    </div>

    <!-- Details -->
    <div class="details-card">
        <div class="section-hdr">
            <h3>Account Details</h3>
            <button class="btn-edit" onclick="openModal('editModal')">✏️ Edit</button>
        </div>
        <div class="detail-rows" id="detailRows">
            <div class="detail-row"><span class="dl">Loading…</span></div>
        </div>
    </div>

    <!-- Quick actions -->
    <div class="quick-actions">
        <div class="qa-btn" onclick="location.href='passbook.html'"><span class="qa-icon">📖</span>Passbook</div>
        <div class="qa-btn" onclick="location.href='loans.html'"><span class="qa-icon">🏦</span>Loans</div>
        <div class="qa-btn" onclick="location.href='fd.html'"><span class="qa-icon">🏛️</span>Fixed Deposits</div>
        <div class="qa-btn" onclick="openLogout()" style="--qa-hover:border-color:#f5576c"><span class="qa-icon">🚪</span>Sign Out</div>
    </div>
</div>

<!-- Mobile Nav -->
<nav class="mobile-nav">
    <a class="mnav-item" href="dashboard.html" data-page="dashboard"><span class="mnav-icon">🏠</span><span class="mnav-label">Home</span></a>
    <a class="mnav-item" href="passbook.html"  data-page="passbook"><span class="mnav-icon">📖</span><span class="mnav-label">Passbook</span></a>
    <a class="mnav-item" href="loans.html"     data-page="loans"><span class="mnav-icon">🏦</span><span class="mnav-label">Loans</span></a>
    <a class="mnav-item" href="fd.html"        data-page="fd"><span class="mnav-icon">🏛️</span><span class="mnav-label">FDs</span></a>
    <a class="mnav-item active" href="profile.html" data-page="profile"><span class="mnav-icon">👤</span><span class="mnav-label">Profile</span></a>
</nav>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-card">
        <div class="modal-title">✏️ Edit Profile</div>
        <form id="editForm">
            <div class="field">
                <label>Field</label>
                <select id="editKey" onchange="clearEditError()">
                    <option value="name">Name</option>
                    <option value="password">Password</option>
                    <option value="email">Email</option>
                </select>
            </div>
            <div class="field">
                <label>New Value</label>
                <input type="text" id="editValue" required placeholder="Enter new value" oninput="clearEditError()">
                <div id="editError" style="display:none;background:#fef2f2;border:1.5px solid #fecaca;border-radius:9px;padding:9px 12px;font-size:13px;font-weight:600;color:#dc2626;margin-top:8px"></div>
            </div>
            <div class="modal-btns">
                <button type="button" class="btn-ghost" onclick="closeModal('editModal')">Cancel</button>
                <button type="submit" class="btn-primary">Update</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API = 'http://localhost:8081';
    let userId;

    function init() {
        const sid = localStorage.getItem('userId');
        const p   = new URLSearchParams(window.location.search);
        userId = sid || p.get('id');
        if (!userId) { location.href='login.html'; return; }
        loadProfile();
        loadStats();
    }

    async function loadProfile() {
        try {
            const data = await (await fetch(`${API}/get-details/${userId}`)).json();

            // Update hero
            const initials = (data.name||data.username||'?').split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);
            document.getElementById('avatarEl').textContent = initials;
            const accType = (data.accountType||'SAVINGS').toUpperCase();
            const pillClass = accType==='SAVINGS'?'pill-savings':accType==='CURRENT'?'pill-current':'pill-admin';

            document.getElementById('heroInfo').innerHTML = `
                <h2>${data.name || data.username}</h2>
                <p>@${data.username}</p>
                <div class="hero-badges">
                    <span class="h-badge">${accType === 'SAVINGS' ? '🏦 Savings' : accType === 'CURRENT' ? '💼 Current' : '🛡️ Admin'}</span>
                    <span class="h-badge">₹${data.balance.toFixed(2)}</span>
                </div>`;

            // Member since
            let memberSince = 'N/A';
            if (data.createdAt) {
                memberSince = new Date(data.createdAt).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
            }

            // Detail rows
            document.getElementById('detailRows').innerHTML = `
                <div class="detail-row">
                    <span class="dl">Full Name</span>
                    <span class="dv">${data.name}</span>
                </div>
                <div class="detail-row">
                    <span class="dl">Username</span>
                    <span class="dv">@${data.username}</span>
                </div>
                <div class="detail-row">
                    <span class="dl">Email</span>
                    <span class="dv">${data.email}</span>
                </div>
                <div class="detail-row">
                    <span class="dl">Account Number</span>
                    <span class="dv">
                        <span id="accNoDisplay" style="font-family:monospace">${data.accountNumber||'—'}</span>
                        <button class="copy-btn" onclick="copyAccNo('${data.accountNumber||''}')" title="Copy">📋</button>
                    </span>
                </div>
                <div class="detail-row">
                    <span class="dl">Account Type</span>
                    <span class="dv"><span class="type-pill ${pillClass}">${accType}</span></span>
                </div>
                <div class="detail-row">
                    <span class="dl">Current Balance</span>
                    <span class="dv" style="color:var(--primary)">₹${data.balance.toFixed(2)}</span>
                </div>
                <div class="detail-row">
                    <span class="dl">Member Since</span>
                    <span class="dv">${memberSince}</span>
                </div>
            `;
        } catch { showMsg('Failed to load profile.','error'); }
    }

    async function loadStats() {
        try {
            const txns = await (await fetch(`${API}/passbook/${userId}`)).json();
            const deposits  = txns.filter(t=>t.description.toLowerCase().includes('deposit')).reduce((s,t)=>s+t.amount,0);
            const withdrawn = txns.filter(t=>t.description.toLowerCase().includes('withdrawal')).reduce((s,t)=>s+t.amount,0);
            const fees      = txns.filter(t=>t.description.toLowerCase().includes('fee')).reduce((s,t)=>s+t.amount,0);

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total Transactions</div>
                    <div class="stat-val">${txns.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Deposited</div>
                    <div class="stat-val" style="color:var(--green)">₹${deposits.toFixed(0)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Withdrawn</div>
                    <div class="stat-val" style="color:var(--red)">₹${withdrawn.toFixed(0)}</div>
                </div>
            `;
        } catch {}
    }

    function copyAccNo(accNo) {
        if (!accNo) return;
        navigator.clipboard.writeText(accNo).then(() => showMsg('Account number copied! ✓','success'));
    }

    // Edit form
    function clearEditError() {
        const errEl = document.getElementById('editError');
        const input = document.getElementById('editValue');
        errEl.style.display = 'none';
        input.style.borderColor = '';
    }

    document.getElementById('editForm').addEventListener('submit', async e => {
        e.preventDefault();
        const errEl = document.getElementById('editError');
        const input = document.getElementById('editValue');
        errEl.style.display = 'none';
        input.style.borderColor = '';
        try {
            const r = await fetch(`${API}/update`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:+userId,key:document.getElementById('editKey').value,value:input.value})});
            const t = await r.text();
            if (r.ok && t.toLowerCase().includes('successfully')) {
                closeModal('editModal');
                showMsg('Profile updated! ✓','success');
                loadProfile();
            } else {
                errEl.textContent = '⚠️ ' + t;
                errEl.style.display = 'block';
                input.style.borderColor = '#fecaca';
                input.focus();
            }
        } catch {
            errEl.textContent = '⚠️ Error updating profile.';
            errEl.style.display = 'block';
            input.style.borderColor = '#fecaca';
        }
    });

    const openModal  = id => document.getElementById(id).classList.add('show');
    const closeModal = id => {
        document.getElementById(id).classList.remove('show');
        document.getElementById(id).querySelector('form')?.reset();
        clearEditError();
    };

    function showMsg(msg,type){const el=document.getElementById('profileMsg');el.textContent=msg;el.className='message '+type+' show';setTimeout(()=>el.classList.remove('show'),3500)}
    function openLogout(){document.getElementById('profileLogout').style.display='flex';}
    function doLogout(){localStorage.clear();location.href='home.html';}

    window.addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeModal('editModal');if(e.target===document.getElementById('profileLogout'))document.getElementById('profileLogout').style.display='none';});
    window.addEventListener('DOMContentLoaded',init);
</script>

<div id="profileLogout" style="display:none;position:fixed;z-index:9999;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:20px;padding:32px;max-width:360px;width:90%;text-align:center;border:1px solid #e2e1f0;box-shadow:0 20px 60px rgba(0,0,0,.2)">
        <div style="font-size:48px;margin-bottom:14px">👋</div>
        <div style="font-size:20px;font-weight:700;color:#0f0e17;margin-bottom:8px">Signing out?</div>
        <div style="font-size:13px;color:#6b7280;font-weight:500;margin-bottom:24px">You'll need to log back in to access your account.</div>
        <div style="display:flex;gap:10px">
            <button onclick="document.getElementById('profileLogout').style.display='none'" style="flex:1;padding:12px;background:#fafaf8;color:#6b7280;border:1.5px solid #e2e1f0;border-radius:10px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;cursor:pointer">Stay</button>
            <button onclick="doLogout()" style="flex:1;padding:12px;background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;border:none;border-radius:10px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;cursor:pointer">Sign out</button>
        </div>
    </div>
</div>
</body>
</html>
